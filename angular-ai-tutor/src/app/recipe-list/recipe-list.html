<div class="recipe-list-container">
  <!-- Sidebar with filter and list -->
  <aside class="recipe-sidebar">
    <!-- Search Filter -->
    <div class="search-section">
      <h2 class="search-title">Recipes</h2>
      <input
        type="search"
        placeholder="Search recipes..."
        class="search-input"
        [(ngModel)]="searchTerm"
      />
    </div>

    <!-- Recipes List -->
    <div class="recipes-list">
      @for (recipe of recipes(); track recipe.name) {
        <button
          (click)="switchToRecipe(recipe)"
          class="recipe-card"
          [class.recipe-card-active]="currentRecipe() === recipe"
        >
          <div class="recipe-card-content">
            <h3 class="recipe-card-title">{{ recipe.name }}</h3>
            <p class="recipe-card-description">{{ recipe.description }}</p>
          </div>
          @if (recipe.isFavorite) {
            <span class="recipe-card-favorite">★</span>
          }
        </button>
      }
    </div>
  </aside>

  <!-- Main content with recipe details -->
  <main class="recipe-main-content">
    <app-recipe-detail [recipe]="currentRecipe()" />
  </main>
</div>
