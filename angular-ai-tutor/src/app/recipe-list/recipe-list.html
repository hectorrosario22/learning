<div class="recipe-list-container">
  <!-- Search Filter -->
  <div class="search-section">
    <h2 class="search-title">Search Recipes</h2>
    <input
      type="search"
      placeholder="Search recipes..."
      class="search-input"
      [(ngModel)]="searchTerm"
    />
  </div>

  <!-- Recipes Grid -->
  <div class="recipes-grid">
    @for (recipe of recipes(); track recipe.name) {
      <a [routerLink]="['/recipes', recipe.id]" class="recipe-card-link">
        <div class="recipe-card">
          <img [src]="recipe.imgUrl" [alt]="recipe.name" class="recipe-card-image" />
          <div class="recipe-card-content">
            <div class="recipe-card-header">
              <h3 class="recipe-card-title">{{ recipe.name }}</h3>
              @if (recipe.isFavorite) {
                <span class="recipe-card-favorite">★</span>
              }
            </div>
            <p class="recipe-card-description">{{ recipe.description }}</p>
          </div>
        </div>
      </a>
    }
  </div>
</div>
